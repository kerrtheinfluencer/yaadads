<!DOCTYPE html>
<html lang="en-JM">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaad Adz — Redirecting…</title>
<meta name="robots" content="noindex">
<!-- ══════════════════════════════════════════════════════
     GITHUB PAGES SLUG ROUTER
     ─────────────────────────────────────────────────────
     GitHub Pages serves this file for any unknown path.
     We read the path and redirect to index.html while
     preserving the slug in sessionStorage so index.html
     can open the right listing on load.

     Supported patterns:
       /ad/2015-honda-civic-kingston-ab12cd34  → ad detail
       /ad/ab12cd34                            → short ID only (legacy)
       anything else                           → home
══════════════════════════════════════════════════════ -->
<script>
(function() {
  var path = window.location.pathname;   // e.g. /ad/2015-honda-civic-ab12cd34
  var search = window.location.search;   // preserve ?q= etc if present
  var hash = window.location.hash;

  // Store the original path so index.html can pick it up
  try {
    sessionStorage.setItem('yaad_redirect_path', path);
  } catch(e) {}

  // Redirect to root, passing the path as a query param as fallback
  // Index.html reads sessionStorage first, then this param
  var redirectUrl = '/' + search + hash;

  // Use replace so the 404 page doesn't appear in browser history
  window.location.replace(redirectUrl);
})();
</script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;margin-top:80px;color:#666">
    Loading Yaad Adz…
  </p>
</body>
</html>
