<!DOCTYPE html>
<html lang="en-JM">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaad Adz — Redirecting…</title>
<meta name="robots" content="noindex, nofollow">
<!-- ══════════════════════════════════════════════════════
     GITHUB PAGES SLUG ROUTER
     ─────────────────────────────────────────────────────
     GitHub Pages serves this file for any unknown path.
     We read the path and redirect to index.html while
     preserving the slug in sessionStorage so index.html
     can open the right listing on load.
     Supported patterns:
       /ad/2015-honda-civic-kingston-ab12cd34  → ad detail
       /ad/ab12cd34                            → short ID only (legacy)
       anything else                           → home
     NOTE: No AdSense on this page — it is a redirect only
     and must not show ads per Google policy.
══════════════════════════════════════════════════════ -->
<script>
(function() {
  var path = window.location.pathname;
  var search = window.location.search;
  var hash = window.location.hash;
  try {
    sessionStorage.setItem('yaad_redirect_path', path);
  } catch(e) {}
  var redirectUrl = '/' + search + hash;
  window.location.replace(redirectUrl);
})();
</script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;margin-top:80px;color:#666">
    Loading Yaad Adz…
  </p>
</body>
</html>
