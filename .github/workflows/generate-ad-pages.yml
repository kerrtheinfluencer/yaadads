name: Generate Ad Pages

on:
  # Run every 2 hours automatically
  schedule:
    - cron: '0 */2 * * *'

  # Run manually from GitHub Actions tab whenever you want
  workflow_dispatch:

  # Also run whenever you push changes to index.html or the generator
  push:
    paths:
      - 'generate-pages.js'
      - 'index.html'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push generated files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Generate ad pages
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node generate-pages.js

      - name: Commit and push generated pages
        run: |
          git config user.name  "Yaad Adz Bot"
          git config user.email "bot@yaadadz.com"
          git add ad/
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "🤖 Auto-generate ad pages [$(date +'%Y-%m-%d %H:%M')]"
          git push
