name: Update Jamaica Gas Prices

on:
  schedule:
    - cron: '0 19 * * 3'  # Every Wednesday at 7PM UTC (after Petrojam weekly update)
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Scrape Petrojam price archive
        run: node scrape-petrojam-archive.js

      - name: Commit changes
        run: |
          git config user.name "Yaad Adz Bot"
          git config user.email "bot@yaadadz.com"
          git add gas-prices-data.json
          git diff --staged --quiet || git commit -m "⛽ Update gas prices from Petrojam archive [$(date +'%Y-%m-%d')]"
          git push
