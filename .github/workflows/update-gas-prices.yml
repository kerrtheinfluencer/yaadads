name: Update Jamaica Gas Prices

on:
  schedule:
    - cron: '0 19 * * 3'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install @supabase/supabase-js

      - name: Scrape Petrojam and update Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scraper.js

      - name: Commit date stamp
        run: |
          sed -i "s/Last updated:.*$/Last updated: $(date +'%b %d, %Y')/" gas-prices.html || true
          git config user.name "Yaad Adz Bot"
          git config user.email "bot@yaadadz.com"
          git add gas-prices.html
          git diff --staged --quiet || git commit -m "Update gas prices stamp [$(date +'%Y-%m-%d')]"
          git push
