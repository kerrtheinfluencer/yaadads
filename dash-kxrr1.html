<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaad Adz — Admin</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:     #0a1410;
  --bg2:    #0f1e17;
  --bg3:    #152318;
  --card:   rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --green:  #1db954;
  --gold:   #f5c842;
  --red:    #e53e3e;
  --text-1: #e8ede9;
  --text-2: #a0a8a4;
  --text-3: #5a6b62;
  --font-d: 'Fraunces', serif;
  --font-s: 'Outfit', sans-serif;
  --radius: 14px;
}
body { font-family:var(--font-s); background:var(--bg); color:var(--text-1); min-height:100vh; }

/* ── LOGIN ── */
#loginScreen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background: radial-gradient(ellipse at 30% 40%, rgba(29,185,84,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 60%, rgba(245,200,66,0.05) 0%, transparent 60%),
              var(--bg);
}
.login-box {
  width: 100%; max-width: 380px; padding: 0 20px;
}
.login-logo {
  text-align:center; margin-bottom:36px;
}
.login-logo h1 {
  font-family:var(--font-d); font-size:32px; font-weight:800;
  color:var(--text-1); line-height:1;
}
.login-logo h1 em { color:var(--gold); font-style:italic; }
.login-logo p { font-size:13px; color:var(--text-3); margin-top:6px; letter-spacing:.5px; text-transform:uppercase; }
.login-card {
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:20px;
  padding:32px;
  backdrop-filter:blur(20px);
}
.login-field { margin-bottom:16px; }
.login-field label { display:block; font-size:12px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.login-field input {
  width:100%; background:rgba(255,255,255,0.06); border:1px solid var(--border);
  border-radius:10px; padding:12px 14px; color:var(--text-1); font-size:15px;
  font-family:var(--font-s); outline:none; transition:border-color .2s;
}
.login-field input:focus { border-color:var(--green); }
.login-btn {
  width:100%; padding:13px; background:var(--green); color:#fff;
  border:none; border-radius:10px; font-size:15px; font-weight:700;
  font-family:var(--font-s); cursor:pointer; margin-top:8px; transition:opacity .2s;
}
.login-btn:hover { opacity:.88; }
.login-error { color:#fc8181; font-size:13px; text-align:center; margin-top:12px; display:none; }

/* ── DASHBOARD ── */
#dashboard { display:none; }
.topbar {
  position:sticky; top:0; z-index:100;
  background:rgba(10,20,16,0.85); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px; height:56px;
  display:flex; align-items:center; gap:16px;
}
.topbar-logo { font-family:var(--font-d); font-size:18px; font-weight:800; }
.topbar-logo em { color:var(--gold); font-style:italic; }
.topbar-badge { background:rgba(229,57,53,0.2); color:#fc8181; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; letter-spacing:.5px; }
.topbar-spacer { flex:1; }
.topbar-user { font-size:13px; color:var(--text-3); }
.logout-btn { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--text-2); padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; font-family:var(--font-s); transition:all .2s; }
.logout-btn:hover { border-color:var(--red); color:var(--red); }

.dash-wrap { max-width:1100px; margin:0 auto; padding:28px 20px 60px; }

/* ── STAT CARDS ── */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
.stat-card {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px 22px; position:relative; overflow:hidden; transition:border-color .2s;
}
.stat-card:hover { border-color:rgba(255,255,255,0.14); }
.stat-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:var(--accent, var(--green));
}
.stat-label { font-size:11px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.6px; margin-bottom:10px; }
.stat-value { font-family:var(--font-d); font-size:32px; font-weight:800; line-height:1; color:var(--text-1); }
.stat-sub { font-size:12px; color:var(--text-3); margin-top:6px; }
.stat-trend { font-size:12px; font-weight:600; }
.trend-up { color:var(--green); }
.trend-dn { color:var(--red); }

/* ── SECTIONS ── */
.section-title { font-family:var(--font-d); font-size:18px; font-weight:800; margin-bottom:16px; color:var(--text-1); display:flex; align-items:center; gap:10px; }
.section-title span { font-family:var(--font-s); font-size:12px; font-weight:600; color:var(--text-3); background:var(--card); border:1px solid var(--border); padding:2px 10px; border-radius:20px; }

.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:28px; }
@media(max-width:680px){ .grid-2 { grid-template-columns:1fr; } }

.panel {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:22px;
}

/* ── TABLES ── */
.data-table { width:100%; border-collapse:collapse; }
.data-table th { font-size:11px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.5px; padding:8px 12px; text-align:left; border-bottom:1px solid var(--border); }
.data-table td { padding:10px 12px; font-size:13px; color:var(--text-2); border-bottom:1px solid rgba(255,255,255,0.04); }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:rgba(255,255,255,0.02); }
.td-title { color:var(--text-1); font-weight:600; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.td-price { color:var(--green); font-weight:700; }
.td-badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-active { background:rgba(29,185,84,.15); color:var(--green); }
.badge-sold   { background:rgba(229,57,53,.15); color:#fc8181; }

/* ── CHARTS (CSS bars) ── */
.bar-chart { display:flex; flex-direction:column; gap:10px; }
.bar-row { display:flex; align-items:center; gap:10px; }
.bar-label { font-size:12px; color:var(--text-2); width:90px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bar-track { flex:1; height:8px; background:rgba(255,255,255,0.06); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; background:var(--green); transition:width .6s ease; }
.bar-count { font-size:12px; color:var(--text-3); width:28px; text-align:right; flex-shrink:0; }

/* ── ACTIVITY FEED ── */
.feed { display:flex; flex-direction:column; gap:0; }
.feed-item { display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.feed-item:last-child { border-bottom:none; }
.feed-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:5px; }
.feed-dot-green { background:var(--green); box-shadow:0 0 6px rgba(29,185,84,.5); }
.feed-dot-gold  { background:var(--gold); box-shadow:0 0 6px rgba(245,200,66,.5); }
.feed-dot-gray  { background:var(--text-3); }
.feed-title { font-size:13px; color:var(--text-1); font-weight:500; }
.feed-sub   { font-size:11px; color:var(--text-3); margin-top:2px; }

/* ── LOADING ── */
.loading { text-align:center; padding:40px; color:var(--text-3); font-size:13px; }
.pulse { animation:pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

/* ── REFRESH BTN ── */
.refresh-btn { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--text-2); padding:6px 14px; border-radius:8px; font-size:12px; cursor:pointer; font-family:var(--font-s); transition:all .2s; margin-left:auto; }
.refresh-btn:hover { border-color:var(--green); color:var(--green); }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <h1>Yaad <em>Adz</em></h1>
      <p>Admin Dashboard</p>
    </div>
    <div class="login-card">
      <div class="login-field">
        <label>Username</label>
        <input type="text" id="adminUser" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="login-btn" onclick="doLogin()">Sign In</button>
      <div class="login-error" id="loginErr">Invalid username or password</div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">Yaad <em>Adz</em></div>
    <div class="topbar-badge">ADMIN</div>
    <div class="topbar-spacer"></div>
    <div class="topbar-user" id="topbarUser"></div>
    <button class="logout-btn" onclick="doLogout()">Log out</button>
  </div>

  <div class="dash-wrap">

    <!-- STAT CARDS -->
    <div class="stats-grid" id="statsGrid">
      <div class="loading pulse">Loading stats…</div>
    </div>

    <!-- TOP ROW -->
    <div class="grid-2">
      <!-- Category breakdown -->
      <div class="panel">
        <div class="section-title">Listings by Category <button class="refresh-btn" onclick="loadDash()">↻ Refresh</button></div>
        <div class="bar-chart" id="catChart"><div class="loading pulse">Loading…</div></div>
      </div>
      <!-- Parish breakdown -->
      <div class="panel">
        <div class="section-title">Listings by Parish</div>
        <div class="bar-chart" id="parishChart"><div class="loading pulse">Loading…</div></div>
      </div>
    </div>

    <!-- MOST VIEWED -->
    <div class="panel" style="margin-bottom:20px">
      <div class="section-title">Most Viewed Listings <span id="totalViewsLabel"></span></div>
      <div id="mostViewed"><div class="loading pulse">Loading…</div></div>
    </div>

    <!-- RECENT LISTINGS -->
    <div class="panel" style="margin-bottom:20px">
      <div class="section-title">Recent Listings <span id="recentLabel"></span></div>
      <div id="recentListings"><div class="loading pulse">Loading…</div></div>
    </div>

    <!-- RECENT MESSAGES -->
    <div class="panel">
      <div class="section-title">Recent Messages</div>
      <div class="feed" id="recentMsgs"><div class="loading pulse">Loading…</div></div>
    </div>

  </div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────
// Credentials stored as salted SHA-256 hash — never plain text
const ADMIN_USER = 'kxrr1';
const PASS_HASH  = '39888f2f1055a369b5de4f7db5df323e:5546ba25ca6499992bd61d5647d9cea84195d8b019589fc4a5b05fe95476d2a2';
const SESSION_KEY = 'ya_admin_sess';

async function hashPass(salt, pass) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey('raw', enc.encode(salt), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(pass));
  return Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const user = document.getElementById('adminUser').value.trim();
  const pass = document.getElementById('adminPass').value;
  const err  = document.getElementById('loginErr');
  err.style.display = 'none';

  if (user !== ADMIN_USER) { err.style.display = 'block'; return; }

  const [salt, storedHash] = PASS_HASH.split(':');
  const inputHash = await hashPass(salt, pass);

  if (inputHash !== storedHash) { err.style.display = 'block'; return; }

  // Auth success
  sessionStorage.setItem(SESSION_KEY, '1');
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('topbarUser').textContent = '👤 ' + user;
  loadDash();
}

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminUser').value = '';
  document.getElementById('adminPass').value = '';
}

// Check session on load
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('topbarUser').textContent = '👤 ' + ADMIN_USER;
}

// ── Supabase ──────────────────────────────────────────────────
const SB_URL = 'https://cquwshpsfybvgqodbxsf.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxdXdzaHBzZnlidmdxb2RieHNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIzNDI3MzMsImV4cCI6MjA1NzkxODczM30.IKqAuBpwlxkRkZvAMDwHpNFCHb9aBQjXQiUOXjJWMXE';
const db = supabase.createClient(SB_URL, SB_KEY);

const CAT_NAMES = {
  vehicles:'Vehicles', property:'Property', electronics:'Electronics',
  furniture:'Furniture', fashion:'Fashion', food:'Food & Farm',
  services:'Services', jobs:'Jobs', sports:'Sports', kids:'Kids', other:'Other'
};
const CAT_COLORS = {
  vehicles:'#1db954', property:'#f5c842', electronics:'#4299e1',
  furniture:'#ed8936', fashion:'#9f7aea', food:'#48bb78',
  services:'#38b2ac', jobs:'#fc8181', sports:'#63b3ed', kids:'#f6ad55'
};

function fmtN(n) { return Number(n||0).toLocaleString('en-JM'); }
function ago(d) {
  if (!d) return '—';
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 60)   return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400)return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

async function loadDash() {
  try {
    // Fetch ads and messages in parallel
    const [adsRes, msgsRes, usersRes] = await Promise.all([
      db.from('ads').select('*').order('created_at', {ascending:false}).limit(500),
      db.from('messages').select('*').order('created_at', {ascending:false}).limit(50),
      db.from('users').select('id, name, created_at').order('created_at', {ascending:false}).limit(100),
    ]);

    const ads   = adsRes.data  || [];
    const msgs  = msgsRes.data || [];
    const users = usersRes.data|| [];

    const active = ads.filter(a => a.status !== 'sold');
    const sold   = ads.filter(a => a.status === 'sold');
    const totalViews = ads.reduce((s,a) => s + (a.views||0), 0);
    const today  = new Date().toDateString();
    const todayAds = ads.filter(a => new Date(a.created_at||a.date).toDateString() === today);

    // ── Stat cards ──
    const stats = [
      { label:'Total Listings',  value: ads.length,    sub: `${active.length} active · ${sold.length} sold`,  accent:'#1db954' },
      { label:'Total Views',     value: fmtN(totalViews), sub:'across all listings',                           accent:'#4299e1' },
      { label:'Members',         value: users.length,  sub:'registered accounts',                              accent:'#f5c842' },
      { label:'Messages Sent',   value: msgs.length,   sub:'total conversations',                              accent:'#9f7aea' },
      { label:'Posted Today',    value: todayAds.length, sub: new Date().toLocaleDateString('en-JM'),          accent:'#ed8936' },
      { label:'Avg Views / Ad',  value: ads.length ? Math.round(totalViews/ads.length) : 0, sub:'views per listing', accent:'#48bb78' },
    ];

    document.getElementById('statsGrid').innerHTML = stats.map(s => `
      <div class="stat-card" style="--accent:${s.accent}">
        <div class="stat-label">${s.label}</div>
        <div class="stat-value">${s.value}</div>
        <div class="stat-sub">${s.sub}</div>
      </div>`).join('');

    // ── Category chart ──
    const catCounts = {};
    ads.forEach(a => { catCounts[a.category] = (catCounts[a.category]||0) + 1; });
    const catSorted = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]);
    const catMax = catSorted[0]?.[1] || 1;
    document.getElementById('catChart').innerHTML = catSorted.map(([id,count]) => `
      <div class="bar-row">
        <div class="bar-label">${CAT_NAMES[id]||id}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(count/catMax*100).toFixed(1)}%;background:${CAT_COLORS[id]||'var(--green)'}"></div></div>
        <div class="bar-count">${count}</div>
      </div>`).join('');

    // ── Parish chart ──
    const parishCounts = {};
    ads.forEach(a => { if(a.parish) parishCounts[a.parish] = (parishCounts[a.parish]||0) + 1; });
    const parishSorted = Object.entries(parishCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const parishMax = parishSorted[0]?.[1] || 1;
    document.getElementById('parishChart').innerHTML = parishSorted.map(([name,count]) => `
      <div class="bar-row">
        <div class="bar-label">${name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(count/parishMax*100).toFixed(1)}%"></div></div>
        <div class="bar-count">${count}</div>
      </div>`).join('');

    // ── Most viewed ──
    const topViewed = [...ads].sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,10);
    document.getElementById('totalViewsLabel').textContent = `${fmtN(totalViews)} total views`;
    document.getElementById('mostViewed').innerHTML = `
      <table class="data-table">
        <thead><tr>
          <th>Listing</th><th>Category</th><th>Parish</th><th>Price</th><th>Views</th><th>Status</th>
        </tr></thead>
        <tbody>${topViewed.map(a=>`
          <tr>
            <td class="td-title">${a.title||'—'}</td>
            <td>${CAT_NAMES[a.category]||a.category||'—'}</td>
            <td>${a.parish||'—'}</td>
            <td class="td-price">J$${fmtN(a.price)}</td>
            <td><strong>${fmtN(a.views||0)}</strong></td>
            <td><span class="td-badge ${a.status==='sold'?'badge-sold':'badge-active'}">${a.status||'active'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>`;

    // ── Recent listings ──
    const recentAds = ads.slice(0, 12);
    document.getElementById('recentLabel').textContent = `${ads.length} total`;
    document.getElementById('recentListings').innerHTML = `
      <table class="data-table">
        <thead><tr>
          <th>Listing</th><th>Seller</th><th>Category</th><th>Price</th><th>Views</th><th>Posted</th><th>Status</th>
        </tr></thead>
        <tbody>${recentAds.map(a=>`
          <tr>
            <td class="td-title">${a.title||'—'}</td>
            <td>${a.seller_name||a.seller||'—'}</td>
            <td>${CAT_NAMES[a.category]||a.category||'—'}</td>
            <td class="td-price">J$${fmtN(a.price)}</td>
            <td>${fmtN(a.views||0)}</td>
            <td>${ago(a.created_at||a.date)}</td>
            <td><span class="td-badge ${a.status==='sold'?'badge-sold':'badge-active'}">${a.status||'active'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>`;

    // ── Recent messages ──
    document.getElementById('recentMsgs').innerHTML = msgs.slice(0,15).map(m => `
      <div class="feed-item">
        <div class="feed-dot feed-dot-green"></div>
        <div>
          <div class="feed-title">${(m.buyer_name||'Buyer')} → ${(m.seller_name||'Seller')}</div>
          <div class="feed-sub">${m.ad_title ? '"'+m.ad_title+'"' : ''} · ${ago(m.created_at)}</div>
        </div>
      </div>`).join('') || '<div class="loading">No messages yet</div>';

  } catch(err) {
    console.error('Dashboard error:', err);
    document.getElementById('statsGrid').innerHTML = '<div class="loading" style="color:#fc8181">Error loading data. Check Supabase connection.</div>';
  }
}

// Auto-refresh every 60 seconds when dashboard is visible
setInterval(function() {
  if (document.getElementById('dashboard').style.display !== 'none') loadDash();
}, 60000);
</script>
</body>
</html>
